<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baratie - Restaurante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

    <div class="bg-primary text-white py-5 text-center">
        <h1 class="display-3 fw-bold">Baratie</h1>
        <p class="lead">El mejor restaurante del East Blue</p>
        <p class="lead">No podria estar mejor</p>
    </div>

    <div class="container py-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2 class="h4 mb-0">Menú del Restaurante</h2>
            </div>
            
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Platillo</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                            </tr>
                        </thead>
                        <tbody id="tablaMenu">

                        </tbody>
                    </table>
                </div>


                <h3 class="mt-5 mb-4">Agregar Nuevo Platillo</h3>
                
                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label">Nombre del Platillo</label>
                        <input type="text" id="txtNombre" class="form-control" placeholder="Ej: Luffy">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Categoría</label>
                        <input type="text" id="txtCategoria" class="form-control" placeholder="Ej: Plato Fuerte">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Precio ($)</label>
                        <input type="number" id="txtPrecio" class="form-control" step="0.01" placeholder="18.50">
                    </div>
                </div>

                <button class="btn btn-success mt-3" id="btnAgregar">Agregar Platillo</button>

            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
